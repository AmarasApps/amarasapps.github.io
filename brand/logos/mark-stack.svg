<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="AmarasApps — Stack mark (liquid glass)">
  <defs>
    <linearGradient id="stBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101226"/>
      <stop offset="1" stop-color="#0B0C0E"/>
    </linearGradient>
    <linearGradient id="glass1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6AA6FF" stop-opacity=".95"/><stop offset="1" stop-color="#3B82F6" stop-opacity=".85"/></linearGradient>
    <linearGradient id="glass2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6D5EF6" stop-opacity=".9"/><stop offset="1" stop-color="#4F46E5" stop-opacity=".8"/></linearGradient>
    <linearGradient id="glass3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9B8CFF" stop-opacity=".9"/><stop offset="1" stop-color="#7C6CF6" stop-opacity=".8"/></linearGradient>
    <linearGradient id="stSheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".5"/><stop offset=".4" stop-color="#fff" stop-opacity="0"/></linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#stBg)"/>
  <!-- three stacked, layered translucent 'chips' offset like sheets of glass = a studio of apps -->
  <g transform="translate(256 256)">
    <g transform="translate(0 74)"><rect x="-118" y="-40" width="236" height="80" rx="26" fill="url(#glass3)"/></g>
    <g transform="translate(0 6)"><rect x="-118" y="-40" width="236" height="80" rx="26" fill="url(#glass2)"/>
      <rect x="-118" y="-40" width="236" height="40" rx="26" fill="url(#stSheen)"/></g>
    <g transform="translate(0 -62)"><rect x="-118" y="-40" width="236" height="80" rx="26" fill="url(#glass1)"/>
      <rect x="-118" y="-40" width="236" height="40" rx="26" fill="url(#stSheen)"/>
      <!-- subtle A apex embossed on top chip -->
      <path d="M0 -22 L20 22 M0 -22 L-20 22 M-11 6 L11 6" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
    </g>
  </g>
</svg>
