<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="AmarasApps — Orbit mark">
  <defs>
    <radialGradient id="orbitBg" cx="30%" cy="25%" r="90%">
      <stop offset="0" stop-color="#171531"/>
      <stop offset="1" stop-color="#0D0B1A"/>
    </radialGradient>
    <linearGradient id="orbitRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9B8CFF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <radialGradient id="orbitCore" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#6D5EF6"/>
    </radialGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#orbitBg)"/>
  <!-- orbit ellipse -->
  <g transform="rotate(-30 256 256)">
    <ellipse cx="256" cy="256" rx="176" ry="86" fill="none" stroke="url(#orbitRing)" stroke-width="20"/>
    <!-- satellite node on the ring -->
    <circle cx="432" cy="256" r="26" fill="#9B8CFF"/>
  </g>
  <!-- core -->
  <circle cx="256" cy="256" r="66" fill="url(#orbitCore)"/>
  <circle cx="256" cy="256" r="66" fill="none" stroke="#ffffff" stroke-opacity=".18" stroke-width="2"/>
</svg>
